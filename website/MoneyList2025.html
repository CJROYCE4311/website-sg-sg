        .sortable {
            cursor: pointer;
            position: relative;
        }

        .sortable::after {
            content: '';
            position: absolute;
            right: 10px;
            top: 50%;
            margin-top: -6px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            opacity: 0.5;
        }

        .sort-asc::after {
            border-bottom: 6px solid white;
        }

        .sort-desc::after {
            border-top: 6px solid white;
        }

                            <th class="sortable text-center py-3 px-4 uppercase font-semibold text-sm"

                            <th class="sortable text-center py-3 px-4 uppercase font-semibold text-sm"
                                data-column="total_earnings" onclick="sortTable(5)">Total Earnings ($)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-gray-700">
                        <!-- Table rows will be populated by JavaScript -->
                    </tbody>
                </table>
            </div>

        // Parse and Render CSV Data
        document.addEventListener('DOMContentLoaded', () => {
             const rows = csvData.trim().split('\n').slice(1); // Skip header
             const tbody = document.getElementById('tableBody');
             if(tbody) tbody.innerHTML = ''; // Clear loading message
             
             rows.forEach((row, rowIndex) => {
                 const cols = row.split(',');
                 if (cols.length < 2) return;
                 
                 const tr = document.createElement('tr');
                 tr.className = rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50'; // Zebra striping
                 
                 cols.forEach((col, idx) => {
                     const td = document.createElement('td');
                     // Player Name (Left), Money (Right)
                     td.className = idx === 0 
                        ? "px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 text-left" 
                        : "px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right";
                     
                     if (idx > 0) {
                        const val = parseFloat(col);
                        td.textContent = isNaN(val) ? '$0.00' : '$' + val.toFixed(2);
                        // Highlight Total Column (Last one)
                        if (idx === cols.length - 1) td.classList.add('font-bold', 'text-green-700', 'bg-gray-100');
                     } else {
                        td.textContent = col;
                     }
                     tr.appendChild(td);
                 });
                 if(tbody) tbody.appendChild(tr);
             });
        });

        // Object to track the sorting direction for each column
        const sortDirections = {};

        // Sort table function
        function sortTable(columnIndex) {
            const table = document.getElementById("moneyTable");
            const tbody = table.tBodies[0];
            const rows = Array.from(tbody.rows);
            const header = table.tHead.rows[0].cells[columnIndex];

            // Determine sort direction
            const direction = sortDirections[columnIndex] === 'asc' ? 'desc' : 'asc';
            sortDirections[columnIndex] = direction;

            // Remove sorting classes from all headers
            document.querySelectorAll('#moneyTable th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });

            // Add sorting class to current header
            header.classList.add(direction === 'asc' ? 'sort-asc' : 'sort-desc');

            // Sort the rows
            rows.sort((rowA, rowB) => {
                const cellA = rowA.cells[columnIndex].innerText;
                const cellB = rowB.cells[columnIndex].innerText;

                let valA, valB;

                if (columnIndex > 0) {
                    valA = parseFloat(cellA.replace(/[^0-9.-]+/g, ""));
                    valB = parseFloat(cellB.replace(/[^0-9.-]+/g, ""));
                } else {
                    valA = cellA.toLowerCase();
                    valB = cellB.toLowerCase();
                }

                if (valA < valB) {
                    return direction === 'asc' ? -1 : 1;
                }
                if (valA > valB) {
                    return direction === 'asc' ? 1 : -1;
                }
                return 0;
            });

            // Re-append sorted rows
            rows.forEach((row, index) => {
                row.className = index % 2 === 0 ? 'border-b' : 'bg-gray-50 border-b';
                tbody.appendChild(row);
            });
        }

        // Search function
        function searchPlayer() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const tableBody = document.getElementById("tableBody");
            const rows = tableBody.getElementsByTagName("tr");

            // Only filter if input length is 3 or more characters
            if (filter.length >= 3) {
                for (let i = 0; i < rows.length; i++) {
                    const playerNameCell = rows[i].getElementsByTagName("td")[0];
                    if (playerNameCell) {
                        const txtValue = playerNameCell.textContent || playerNameCell.innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            rows[i].style.display = "";
                        } else {
                            rows[i].style.display = "none";
                        }
                    }
                }
            } else {
                // Show all rows if less than 3 characters
                for (let i = 0; i < rows.length; i++) {
                    rows[i].style.display = "";
                }
            }
        }
