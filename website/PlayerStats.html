    <style>
        /* Custom Grid for the specific 3 rows of 6 columns request on large screens */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
        }

        @media (min-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .gauge-container {
            position: relative;
            width: 100%;
            padding-bottom: 60%;
            /* Aspect ratio */
            height: 0;
            overflow: hidden;
        }

        .gauge-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .needle {
            transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-origin: 100px 90px;
            /* Pivot point matching SVG coordinate space */
        }

        .needle-label {
            font-size: 12px;
            font-weight: bold;
            fill: #374151;
            text-anchor: middle;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="dashboard-theme.css">
</head>

        function loadData() {
            const grid = document.getElementById('player-grid');
            const lines = playerStatsData.trim().split('\n');
            const headers = lines[0].split(',');

            // Skip header
            lines.slice(1).forEach(line => {
                const [player, gross, net, netToPar] = line.split(',');
                if (!player) return;

                const rotation = calculateRotation(parseFloat(netToPar));
                
                // Color Logic
                let gaugeColor = "#22c55e"; // Green
                if (parseFloat(netToPar) > 0) gaugeColor = "#eab308"; // Yellow
                if (parseFloat(netToPar) > 5) gaugeColor = "#ef4444"; // Red

                const card = document.createElement('div');
                card.className = "bg-gray-50 rounded-xl p-4 border border-gray-200 shadow-sm flex flex-col items-center hover:shadow-md transition";
                card.innerHTML = `
                    <h3 class="text-lg font-bold text-gray-900 mb-4 truncate w-full text-center" title="${player}">${player}</h3>
                    
                    <div class="gauge-container mb-2 w-32">
                        <svg class="gauge-svg" viewBox="0 0 200 120">
                            <!-- Gauge Background Arc (3 segments) -->
                            <!-- Green Segment (-90 to -30 deg) -->
                            <path d="M 30 90 A 70 70 0 0 1 65 29" fill="none" stroke="#22c55e" stroke-width="15" stroke-linecap="butt" />
                            <!-- Yellow Segment (-30 to 30 deg) -->
                            <path d="M 65 29 A 70 70 0 0 1 135 29" fill="none" stroke="#eab308" stroke-width="15" stroke-linecap="butt" />
                            <!-- Red Segment (30 to 90 deg) -->
                            <path d="M 135 29 A 70 70 0 0 1 170 90" fill="none" stroke="#ef4444" stroke-width="15" stroke-linecap="butt" />
                            
                            <!-- Needle -->
                            <g class="needle" style="transform: rotate(${rotation}deg);">
                                <path d="M 100 90 L 100 25" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
                                <circle cx="100" cy="90" r="6" fill="#1f2937" />
                            </g>
                            
                            <!-- Text overlay -->
                            <text x="100" y="105" class="needle-label" font-size="22" font-weight="900" fill="#111827">
                                ${parseFloat(netToPar) > 0 ? '+' : ''}${netToPar}
                            </text>
                            <text x="100" y="118" class="needle-label" font-size="10" font-weight="bold" fill="#6b7280" style="text-transform: uppercase; letter-spacing: 0.05em;">
                                Vs Par
                            </text>
                        </svg>
                    </div>

                    <div class="w-full grid grid-cols-2 gap-2 text-center text-sm">
                        <div class="bg-white p-2 rounded border border-gray-100">
                            <p class="text-gray-400 text-[10px] uppercase font-bold leading-none mb-1">Gross</p>
                            <p class="font-black text-gray-900 leading-none">${gross}</p>
                        </div>
                        <div class="bg-white p-2 rounded border border-gray-100">
                            <p class="text-gray-400 text-[10px] uppercase font-bold leading-none mb-1">Net</p>
                            <p class="font-black text-gray-900 leading-none">${net}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

        }

        function calculateRotation(value) {
            // Map value to degrees (-90 to 90)
            // Range: -5 (Excellent) to +10 (Bad)
            const minVal = -5;
            const maxVal = 10;
            const minDeg = -90;
            const maxDeg = 90;
            
            let clamped = Math.max(minVal, Math.min(maxVal, value));
            // Normalize 0-1
            let percent = (clamped - minVal) / (maxVal - minVal);
            return minDeg + (percent * (maxDeg - minDeg));
        }
